{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h2 class="mb-4">Products</h2>

<div class="row">
    {% for product in products %}
        <div class="col-md-3 mb-4">
            <div class="card p-3 shadow-sm">

                <img src="{{ product.image_url }}" class="card-img-top" style="height:150px; object-fit:cover;">

                <div class="card-body">
                    <h5>{{ product.name }}</h5>
                    <p>₹{{ product.price / 100 }}</p>

                    <a href="{{ url_for('store.product_detail', id=product.id) }}" class="btn btn-sm btn-primary">
                      View
                    </a>

                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('cart.add_to_cart', product_id=product.id) }}" class="btn btn-sm btn-success">
                            Add
                        </a>
                    {% else %}
                        <a href="{{ url_for('auth.login') }}" class="btn btn-sm btn-secondary">
                            Login to Buy
                        </a>
                    {% endif %}

                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
