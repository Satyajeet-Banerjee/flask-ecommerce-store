<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}MyStore{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f1f3f6;">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('store.home') }}">MyStore</a>

        <div>
            {% if current_user.is_authenticated %}

                <span class="text-white me-3">
                    Hello, {{ current_user.name }}
                </span>
            <a href="{{ url_for('store.orders') }}" class="btn btn-light me-2">
                Orders
            </a>

                <a href="{{ url_for('cart.view_cart') }}" class="btn btn-light me-2">
                  Cart ({{ cart_count }})
                </a>

                <a href="{{ url_for('auth.logout') }}" class="btn btn-danger">
                    Logout
                </a>

            {% else %}

                <a href="{{ url_for('auth.login') }}" class="btn btn-light me-2">
                    Login
                </a>

                <a href="{{ url_for('auth.register') }}" class="btn btn-warning">
                    Register
                </a>

            {% endif %}
        </div>

    </div>
</nav>

<!-- 🔥 PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
